<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XSS Lab | Eldaniz Ibrahimli</title>
<style>
:root{
  --bg-primary:#0f172a;
  --bg-secondary:#1e293b;
  --accent-primary:#10b981;
  --accent-secondary:#34d399;
  --text-primary:#f1f5f9;
  --text-secondary:#94a3b8;
  --danger:#ef4444;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2rem;
}

.container{
  max-width:900px;
  width:100%;
  text-align:center;
}

.logo{
  margin-bottom:3rem;
}

.logo .bracket{
  color:var(--accent-primary);
  font-size:3rem;
  font-weight:bold;
  text-shadow:0 0 20px rgba(16,185,129,0.5);
}

.logo h1{
  font-size:4rem;
  margin:1rem 0;
  background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:4px;
}

.subtitle{
  color:var(--text-secondary);
  font-size:1.1rem;
  letter-spacing:2px;
}

.entry-options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2rem;
  margin-bottom:3rem;
}

.entry-card{
  background:var(--bg-secondary);
  border:2px solid var(--accent-primary);
  border-radius:16px;
  padding:2.5rem 2rem;
  text-decoration:none;
  color:var(--text-primary);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  display:block;
}

.entry-card:hover{
  transform:translateY(-8px);
  box-shadow:0 20px 40px rgba(16,185,129,0.3);
  border-color:var(--accent-secondary);
}

.entry-card.locked{
  border-color:var(--danger);
  opacity:0.7;
  cursor:not-allowed;
}

.entry-card.locked:hover{
  transform:none;
  box-shadow:none;
}

.entry-card .icon{
  font-size:3.5rem;
  margin-bottom:1rem;
}

.entry-card h2{
  font-size:1.75rem;
  margin-bottom:0.75rem;
  color:var(--accent-primary);
  letter-spacing:2px;
}

.entry-card.locked h2{
  color:var(--danger);
}

.entry-card p{
  color:var(--text-secondary);
  margin-bottom:1.5rem;
  font-size:0.95rem;
}

.entry-card .enter{
  display:inline-block;
  padding:0.75rem 2rem;
  background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));
  color:var(--bg-primary);
  border-radius:8px;
  font-weight:600;
  letter-spacing:1px;
  transition:all 0.3s;
}

.entry-card:hover .enter{
  box-shadow:0 5px 15px rgba(16,185,129,0.4);
}

.entry-card.locked .enter{
  background:var(--danger);
  color:white;
}

.credit{
  color:var(--text-secondary);
  font-size:0.9rem;
  margin-top:3rem;
}

.credit .author{
  color:var(--accent-primary);
  font-weight:600;
}

@media(max-width:768px){
  .entry-options{
    grid-template-columns:1fr;
  }
  
  .logo h1{
    font-size:2.5rem;
  }
}
</style>
</head>
<body>
  <div class="container">
